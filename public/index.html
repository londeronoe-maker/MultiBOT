<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiBOT Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f5f5f5; --bg2: #fff; --bg3: #f9f9f9; --text: #1a1a2e; --text2: #888;
      --border: #eee; --border2: #ddd; --shadow: rgba(0,0,0,0.06);
      --gold: #FFD700; --gold2: #e6c200; --danger: #f44336; --warning: #FF9800;
      --success-bg: #e8f5e9; --success-text: #2e7d32; --success-border: #a5d6a7;
      --error-bg: #ffebee; --error-text: #c62828; --error-border: #ef9a9a;
    }
    [data-theme="dark"] {
      --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460; --text: #f0f0f0; --text2: #aaa;
      --border: #0f3460; --border2: #333; --shadow: rgba(0,0,0,0.3);
      --success-bg: #1e4d2b; --success-text: #4CAF50; --success-border: #2e7d32;
      --error-bg: #4d1e1e; --error-text: #ef9a9a; --error-border: #c62828;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s, color 0.2s; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: var(--bg2); padding: 40px; border-radius: 16px; width: 340px; border: 2px solid var(--gold); box-shadow: 0 4px 24px var(--shadow); }
    .login-box h2 { text-align: center; color: var(--text); margin-bottom: 24px; font-size: 22px; }
    .login-box input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-size: 15px; margin-bottom: 12px; }
    .login-box input:focus { outline: none; border-color: var(--gold); }
    .login-box button { width: 100%; padding: 12px; background: var(--gold); color: #1a1a2e; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .login-box button:hover { background: var(--gold2); }

    .dashboard { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .header h1 { color: var(--text); font-size: 22px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .username-badge { background: var(--gold); padding: 6px 12px; border-radius: 8px; font-size: 13px; color: #1a1a2e; font-weight: bold; }
    .logout { background: transparent; border: 2px solid var(--text); color: var(--text); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; }
    .logout:hover { background: var(--text); color: var(--bg); }
    .theme-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 18px; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: var(--bg2); border-radius: 12px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 2px 12px var(--shadow); }
    .card h3 { color: var(--text2); font-size: 11px; margin-bottom: 8px; text-transform: uppercase; }
    .card p { font-size: 18px; font-weight: bold; color: var(--text); }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .online { background: #4CAF50; } .offline { background: #f44336; }

    .section { background: var(--bg2); border-radius: 12px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: 0 2px 12px var(--shadow); overflow: hidden; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; cursor: pointer; user-select: none; }
    .section-header h2 { color: var(--text); font-size: 16px; border-left: 4px solid var(--gold); padding-left: 10px; }
    .section-toggle { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .section-body { padding: 0 20px 20px; }
    .section-body.collapsed { display: none; }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-row input, .form-row textarea, .form-row select { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-size: 14px; min-width: 140px; }
    .form-row input:focus, .form-row textarea:focus { outline: none; border-color: var(--gold); }
    .form-row textarea { height: 90px; resize: vertical; }
    .btn { padding: 10px 20px; background: var(--gold); color: #1a1a2e; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn:hover { background: var(--gold2); }
    .btn-danger { background: var(--danger); color: #fff; padding: 6px 12px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; }
    .btn-warning { background: var(--warning); color: #fff; padding: 6px 12px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; }
    .feedback { margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 13px; display: none; }
    .feedback.success { background: var(--success-bg); color: var(--success-text); display: block; border: 1px solid var(--success-border); }
    .feedback.error { background: var(--error-bg); color: var(--error-text); display: block; border: 1px solid var(--error-border); }

    .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; border: 1px solid var(--border2); color: var(--text2); background: var(--bg3); }
    .tab.active { background: var(--gold); color: #1a1a2e; border-color: var(--gold); font-weight: bold; }

    .comptes-list, .rapports-list { margin-top: 12px; }
    .compte-item, .rapport-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--bg3); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
    .compte-info, .rapport-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .role-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .role-admin { background: var(--gold); color: #1a1a2e; }
    .role-normal { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 16px; }
    .stat-edit { display: flex; flex-direction: column; gap: 5px; }
    .stat-edit label { font-size: 11px; color: var(--text2); text-transform: uppercase; font-weight: bold; }
    .stat-edit input { padding: 10px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-size: 16px; font-weight: bold; width: 100%; }
    .ratio-display { font-size: 13px; color: var(--text2); margin-top: 6px; }
    .ratio-display span { color: var(--text); font-weight: bold; }

    .chart-tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .chart-tab { padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; border: 1px solid var(--border2); color: var(--text2); background: var(--bg3); font-weight: bold; }
    .chart-tab.active { background: var(--gold); color: #1a1a2e; border-color: var(--gold); }
    .chart-container { position: relative; height: 260px; }

    .send-results { margin-top: 10px; }
    .send-result-item { padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
    .send-result-item.ok { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
    .send-result-item.ko { background: var(--error-bg); color: var(--error-text); border: 1px solid var(--error-border); }

    /* Menu déroulant membres */
    .member-select-wrapper { position: relative; }
    .member-search { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-size: 14px; }
    .member-search:focus { outline: none; border-color: var(--gold); }
    .member-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; max-height: 250px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 12px var(--shadow); display: none; }
    .member-dropdown.open { display: block; }
    .member-option { display: flex; align-items: center; gap: 10px; padding: 8px 12px; cursor: pointer; transition: background 0.1s; }
    .member-option:hover { background: var(--bg3); }
    .member-option img { width: 32px; height: 32px; border-radius: 50%; }
    .member-option span { font-size: 13px; color: var(--text); }
    .selected-members { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .selected-member { display: flex; align-items: center; gap: 6px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; padding: 4px 10px; font-size: 12px; }
    .selected-member img { width: 20px; height: 20px; border-radius: 50%; }
    .selected-member button { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }

    @media (max-width: 600px) {
      .dashboard { padding: 12px; }
      .cards { grid-template-columns: repeat(2, 1fr); }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-container { height: 200px; }
    }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>🤖 MultiBOT Dashboard</h2>
    <input type="text" id="loginUsername" placeholder="Nom d'utilisateur" onkeydown="if(event.key==='Enter') login()">
    <input type="password" id="loginPassword" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Se connecter</button>
    <div class="feedback error" id="loginError" style="display:none;margin-top:12px">Identifiants incorrects</div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="header">
    <h1>🤖 MultiBOT Dashboard</h1>
    <div class="header-right">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <span class="username-badge" id="usernameDisplay"></span>
      <button class="logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="cards">
    <div class="card"><h3>Statut</h3><p><span class="status-dot" id="statusDot"></span><span id="statusText">...</span></p></div>
    <div class="card"><h3>Bot</h3><p id="botTag" style="font-size:13px">...</p></div>
    <div class="card"><h3>Uptime</h3><p id="uptime" style="font-size:14px">...</p></div>
  </div>

  <!-- Graphique -->
  <div class="section">
    <div class="section-header" onclick="toggleSection('graphique')">
      <h2>📈 Évolution du mois</h2>
      <span class="section-toggle" id="toggle-graphique">▼</span>
    </div>
    <div class="section-body" id="body-graphique">
      <div class="chart-tabs">
        <button class="chart-tab active" onclick="switchChartView('jour')">Par jour</button>
        <button class="chart-tab" onclick="switchChartView('semaine')">Par semaine</button>
        <button class="chart-tab" onclick="switchChartView('mois')">Cumul mois</button>
      </div>
      <div class="chart-container"><canvas id="statsChart"></canvas></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="section">
    <div class="section-header" onclick="toggleSection('stats')">
      <h2>📊 Statistiques du mois</h2>
      <span class="section-toggle" id="toggle-stats">▼</span>
    </div>
    <div class="section-body" id="body-stats">
      <div class="stats-grid">
        <div class="stat-edit"><label>💥 Chars détruits</label><input type="number" id="statDetruits" min="0"></div>
        <div class="stat-edit"><label>💀 Chars perdus</label><input type="number" id="statPerdus" min="0"></div>
        <div class="stat-edit"><label>🚩 Chars capturés</label><input type="number" id="statCaptures" min="0"></div>
        <div class="stat-edit"><label>🏆 Record rapport</label><input type="number" id="statRecord" min="0"></div>
      </div>
      <div class="ratio-display">Ratio : <span id="ratioDisplay">—</span></div>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
        <button class="btn" onclick="sauvegarderStats()">💾 Sauvegarder</button>
        <button class="btn btn-danger" onclick="resetStats()">🔁 Réinitialiser</button>
      </div>
      <div class="feedback" id="statsFeedback"></div>
      <div style="margin-top:20px">
        <h3 style="color:var(--text);margin-bottom:10px;font-size:14px;border-left:4px solid var(--gold);padding-left:8px">📋 Rapports du mois</h3>
        <div class="rapports-list" id="rapportsList"></div>
      </div>
    </div>
  </div>

  <!-- Envoyer un message -->
  <div class="section">
    <div class="section-header" onclick="toggleSection('message')">
      <h2>💬 Envoyer un message</h2>
      <span class="section-toggle" id="toggle-message">▼</span>
    </div>
    <div class="section-body" id="body-message">
      <div class="member-select-wrapper">
        <input type="text" class="member-search" id="memberSearch" placeholder="Rechercher un membre Discord..." autocomplete="off" oninput="filtrerMembres()" onfocus="ouvrirDropdown()" onblur="setTimeout(fermerDropdown, 200)">
        <div class="member-dropdown" id="memberDropdown"></div>
      </div>
      <div class="selected-members" id="selectedMembers"></div>
      <div class="form-row" style="margin-top:10px">
        <textarea id="messageContent" placeholder="Ton message..."></textarea>
      </div>
      <div style="margin-top:10px"><button class="btn" onclick="envoyerMessage()">Envoyer</button></div>
      <div class="send-results" id="sendResults"></div>
    </div>
  </div>

  <!-- Comptes (admin) -->
  <div class="section" id="sectionComptes" style="display:none">
    <div class="section-header" onclick="toggleSection('comptes')">
      <h2>👥 Gestion des comptes</h2>
      <span class="section-toggle" id="toggle-comptes">▼</span>
    </div>
    <div class="section-body" id="body-comptes">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('liste')">Liste</button>
        <button class="tab" onclick="switchTab('creer')">Créer</button>
        <button class="tab" onclick="switchTab('modifier')">Modifier</button>
      </div>
      <div id="tabListe"><div class="comptes-list" id="comptesList"></div></div>
      <div id="tabCreer" style="display:none">
        <div class="form-row">
          <input type="text" id="newUsername" placeholder="Nom d'utilisateur">
          <input type="password" id="newPassword" placeholder="Mot de passe">
          <select id="newRole"><option value="normal">Normal</option><option value="admin">Admin</option></select>
        </div>
        <div style="margin-top:10px"><button class="btn" onclick="creerCompte()">Créer</button></div>
        <div class="feedback" id="creerFeedback"></div>
      </div>
      <div id="tabModifier" style="display:none">
        <div class="form-row">
          <input type="text" id="modUsername" placeholder="Nom d'utilisateur actuel">
          <input type="text" id="modNewUsername" placeholder="Nouveau nom (optionnel)">
        </div>
        <div class="form-row" style="margin-top:10px">
          <input type="password" id="modNewPassword" placeholder="Nouveau mot de passe (optionnel)">
          <select id="modNewRole">
            <option value="">Garder le rôle</option>
            <option value="normal">Normal</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div style="margin-top:10px"><button class="btn" onclick="modifierCompte()">Modifier</button></div>
        <div class="feedback" id="modifierFeedback"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const BOT_URL = window.location.origin;
  let username = '', password = '', role = '';
  let statsData = null, chart = null, chartView = 'jour';
  let darkMode = localStorage.getItem('theme') === 'dark';
  let tousLesMembres = [], membresSelectionnes = [];

  function applyTheme() {
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    document.getElementById('themeBtn').textContent = darkMode ? '☀️' : '🌙';
    if (chart) majGraphique();
  }
  function toggleTheme() { darkMode = !darkMode; localStorage.setItem('theme', darkMode ? 'dark' : 'light'); applyTheme(); }
  applyTheme();

  function toggleSection(id) {
    const body = document.getElementById('body-' + id);
    const toggle = document.getElementById('toggle-' + id);
    const collapsed = body.classList.toggle('collapsed');
    toggle.textContent = collapsed ? '▶' : '▼';
  }

  function login() {
    username = document.getElementById('loginUsername').value;
    password = document.getElementById('loginPassword').value;
    fetch(`${BOT_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) })
    .then(r => r.json()).then(data => {
      if (data.error) { document.getElementById('loginError').style.display = 'block'; return; }
      role = data.role;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('usernameDisplay').textContent = `👤 ${username} (${role})`;
      if (role === 'admin') { document.getElementById('sectionComptes').style.display = 'block'; chargerComptes(); }
      chargerStatut(); chargerStats(); chargerMembres();
      setInterval(chargerStatut, 10000);
    });
  }

  function logout() {
    username = ''; password = ''; role = '';
    tousLesMembres = []; membresSelectionnes = [];
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('sectionComptes').style.display = 'none';
    if (chart) { chart.destroy(); chart = null; }
  }

  function headers() { return { 'Content-Type': 'application/json', 'x-username': username, 'x-password': password }; }

  function chargerStatut() {
    fetch(`${BOT_URL}/status`, { headers: headers() }).then(r => r.json()).then(data => {
      const dot = document.getElementById('statusDot');
      dot.className = 'status-dot ' + (data.online ? 'online' : 'offline');
      document.getElementById('statusText').textContent = data.online ? 'En ligne' : 'Hors ligne';
      document.getElementById('botTag').textContent = data.tag;
      const h = Math.floor(data.uptime/3600), m = Math.floor((data.uptime%3600)/60), s = data.uptime%60;
      document.getElementById('uptime').textContent = `${h}h ${m}m ${s}s`;
    });
  }

  // ===== MEMBRES =====
  function chargerMembres() {
    fetch(`${BOT_URL}/membres`, { headers: headers() }).then(r => r.json()).then(data => {
      tousLesMembres = data;
      afficherDropdown(data);
    }).catch(() => {});
  }

function afficherDropdown(membres) {
    const dd = document.getElementById('memberDropdown');
    dd.innerHTML = membres.map(m => `
      <div class="member-option" onclick="selectionnerMembre('${m.id}', '${m.displayName}', '${m.avatar}')">
        <img src="${m.avatar}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt="">
        <div style="display:flex;flex-direction:column;gap:2px">
          <span style="font-size:13px;color:var(--text)">${m.displayName}</span>
          <span style="font-size:11px;color:var(--text2)">${m.id}</span>
        </div>
      </div>
    `).join('');
  }

  function filtrerMembres() {
    const q = document.getElementById('memberSearch').value.toLowerCase();
    const filtres = tousLesMembres.filter(m =>
      m.displayName.toLowerCase().includes(q) ||
      m.username.toLowerCase().includes(q) ||
      m.id.includes(q)
    );
    afficherDropdown(filtres);
    ouvrirDropdown();
  }

  function filtrerMembres() {
    const q = document.getElementById('memberSearch').value.toLowerCase();
    const filtres = tousLesMembres.filter(m => m.displayName.toLowerCase().includes(q) || m.username.toLowerCase().includes(q));
    afficherDropdown(filtres);
    ouvrirDropdown();
  }

  function ouvrirDropdown() { document.getElementById('memberDropdown').classList.add('open'); }
  function fermerDropdown() { document.getElementById('memberDropdown').classList.remove('open'); }

  function selectionnerMembre(id, nom, avatar) {
    if (membresSelectionnes.find(m => m.id === id)) return;
    membresSelectionnes.push({ id, nom, avatar });
    majSelectedMembers();
    document.getElementById('memberSearch').value = '';
    fermerDropdown();
  }

  function retirerMembre(id) {
    membresSelectionnes = membresSelectionnes.filter(m => m.id !== id);
    majSelectedMembers();
  }

  function majSelectedMembers() {
    document.getElementById('selectedMembers').innerHTML = membresSelectionnes.map(m => `
      <div class="selected-member">
        <img src="${m.avatar}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt="">
        <span>${m.nom}</span>
        <button onclick="retirerMembre('${m.id}')">×</button>
      </div>
    `).join('');
  }

  // ===== STATS =====
  function chargerStats() {
    fetch(`${BOT_URL}/stats`, { headers: headers() }).then(r => r.json()).then(data => {
      statsData = data;
      document.getElementById('statDetruits').value = data.charsDetruitTotal || 0;
      document.getElementById('statPerdus').value = data.charsPerdusTotal || 0;
      document.getElementById('statCaptures').value = data.charsCapturesTotal || 0;
      document.getElementById('statRecord').value = data.recordRapport || 0;
      majRatio(); majGraphique();
      const list = document.getElementById('rapportsList');
      if (!data.rapports?.length) { list.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:10px">Aucun rapport ce mois-ci</div>'; return; }
      list.innerHTML = data.rapports.map(r => `
        <div class="rapport-item">
          <div class="rapport-info">
            <span>📋 <strong>${r.nom}</strong></span>
            <span style="color:var(--text2);font-size:12px">🎯 ${r.tireur}</span>
            <span style="color:#e65100;font-weight:bold">💥 ${r.detruits}</span>
            <span style="color:#c62828;font-weight:bold">💀 ${r.perdus}</span>
            <span style="color:#1565c0;font-weight:bold">🚩 ${r.captures||0}</span>
            <span style="color:var(--text2);font-size:12px">${r.date}</span>
          </div>
          <button class="btn-danger" onclick="supprimerRapport(${r.id})">Supprimer</button>
        </div>
      `).join('');
    });
  }

  function switchChartView(view) {
    chartView = view;
    document.querySelectorAll('.chart-tab').forEach((el, i) => el.classList.toggle('active', ['jour','semaine','mois'][i] === view));
    majGraphique();
  }

  function majGraphique() {
    if (!statsData?.rapports) return;
    const rapports = statsData.rapports;
    let labels = [], detruits = [], perdus = [], captures = [];
    if (chartView === 'jour') {
      const parJour = {};
      rapports.forEach(r => { const d = r.date||'?'; if (!parJour[d]) parJour[d] = {detruits:0,perdus:0,captures:0}; parJour[d].detruits+=r.detruits||0; parJour[d].perdus+=r.perdus||0; parJour[d].captures+=r.captures||0; });
      const jours = Object.keys(parJour).sort();
      labels = jours; detruits = jours.map(j => parJour[j].detruits); perdus = jours.map(j => parJour[j].perdus); captures = jours.map(j => parJour[j].captures);
    } else if (chartView === 'semaine') {
      const parSemaine = {};
      rapports.forEach(r => { const parts = (r.date||'').split('/'); const s = parts.length>=1?`S${Math.ceil(parseInt(parts[0])/7)}`:'S?'; if (!parSemaine[s]) parSemaine[s]={detruits:0,perdus:0,captures:0}; parSemaine[s].detruits+=r.detruits||0; parSemaine[s].perdus+=r.perdus||0; parSemaine[s].captures+=r.captures||0; });
      const semaines = Object.keys(parSemaine).sort();
      labels = semaines; detruits = semaines.map(s => parSemaine[s].detruits); perdus = semaines.map(s => parSemaine[s].perdus); captures = semaines.map(s => parSemaine[s].captures);
    } else {
      let cumD=0,cumP=0,cumC=0;
      [...rapports].sort((a,b)=>a.date>b.date?1:-1).forEach(r => { cumD+=r.detruits||0; cumP+=r.perdus||0; cumC+=r.captures||0; labels.push(r.date||'?'); detruits.push(cumD); perdus.push(cumP); captures.push(cumC); });
    }
    const tc = darkMode?'#aaa':'#888', gc = darkMode?'#0f3460':'#eee';
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('statsChart').getContext('2d'), {
      type: 'line',
      data: { labels, datasets: [
        { label: '💥 Détruits', data: detruits, borderColor: '#FFD700', backgroundColor: 'rgba(255,215,0,0.1)', tension: 0.3, fill: true, pointBackgroundColor: '#FFD700', pointRadius: 5 },
        { label: '💀 Perdus', data: perdus, borderColor: '#f44336', backgroundColor: 'rgba(244,67,54,0.1)', tension: 0.3, fill: true, pointBackgroundColor: '#f44336', pointRadius: 5 },
        { label: '🚩 Capturés', data: captures, borderColor: '#1565c0', backgroundColor: 'rgba(21,101,192,0.1)', tension: 0.3, fill: true, pointBackgroundColor: '#1565c0', pointRadius: 5 }
      ]},
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { color: tc, font: { size: 12 } } }, tooltip: { mode: 'index', intersect: false } }, scales: { x: { ticks: { color: tc }, grid: { color: gc } }, y: { beginAtZero: true, ticks: { color: tc, stepSize: 1 }, grid: { color: gc } } } }
    });
  }

  function majRatio() {
    const d = parseInt(document.getElementById('statDetruits').value)||0;
    const p = parseInt(document.getElementById('statPerdus').value)||0;
    document.getElementById('ratioDisplay').textContent = p>0?(d/p).toFixed(2):d>0?'∞':'0';
  }
  document.addEventListener('input', e => { if (['statDetruits','statPerdus'].includes(e.target.id)) majRatio(); });

  function sauvegarderStats() {
    const feedback = document.getElementById('statsFeedback');
    fetch(`${BOT_URL}/stats`, { method: 'PUT', headers: headers(), body: JSON.stringify({ charsDetruitTotal: document.getElementById('statDetruits').value, charsPerdusTotal: document.getElementById('statPerdus').value, charsCapturesTotal: document.getElementById('statCaptures').value, recordRapport: document.getElementById('statRecord').value }) })
    .then(r => r.json()).then(data => { feedback.textContent = data.success ? "✅ Stats sauvegardées !" : "❌ " + data.error; feedback.className = 'feedback ' + (data.success ? 'success' : 'error'); });
  }

  function resetStats() {
    if (!confirm("Réinitialiser les stats du mois ? Un bilan sera envoyé avant.")) return;
    fetch(`${BOT_URL}/stats/reset`, { method: 'POST', headers: headers() }).then(r => r.json()).then(data => { if (data.success) { alert("✅ Stats réinitialisées !"); chargerStats(); } else alert("❌ " + data.error); });
  }

  function supprimerRapport(id) {
    if (!confirm("Supprimer ce rapport ?")) return;
    fetch(`${BOT_URL}/stats/rapport/${id}`, { method: 'DELETE', headers: headers() }).then(r => r.json()).then(data => { if (data.success) chargerStats(); });
  }

  // ===== ENVOYER MESSAGE =====
  function envoyerMessage() {
    const message = document.getElementById('messageContent').value;
    const results = document.getElementById('sendResults');
    if (!membresSelectionnes.length || !message) { results.innerHTML = '<div class="send-result-item ko">Sélectionne au moins un membre et écris un message !</div>'; return; }
    fetch(`${BOT_URL}/send`, { method: 'POST', headers: headers(), body: JSON.stringify({ userIds: membresSelectionnes.map(m => m.id), message }) })
    .then(r => r.json()).then(data => {
      results.innerHTML = data.results.map(r => `<div class="send-result-item ${r.success?'ok':'ko'}">${r.success?'✅':'❌'} ${membresSelectionnes.find(m=>m.id===r.userId)?.nom||r.userId} — ${r.success?'Envoyé !':r.error}</div>`).join('');
      if (data.results.every(r => r.success)) { document.getElementById('messageContent').value = ''; membresSelectionnes = []; majSelectedMembers(); }
    });
  }

  // ===== COMPTES =====
  function switchTab(tab) {
    ['liste','creer','modifier'].forEach(t => { document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = t===tab?'block':'none'; });
    document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['liste','creer','modifier'][i]===tab));
    if (tab==='liste') chargerComptes();
  }

  function chargerComptes() {
    fetch(`${BOT_URL}/comptes`, { headers: headers() }).then(r => r.json()).then(data => {
      document.getElementById('comptesList').innerHTML = data.map(c => `
        <div class="compte-item">
          <div class="compte-info">
            <span>${c.username}</span>
            <span class="role-badge role-${c.role}">${c.role}</span>
          </div>
          ${c.username !== 'admin' ? `<button class="btn-danger" onclick="supprimerCompte('${c.username}')">Supprimer</button>` : ''}
        </div>
      `).join('');
    });
  }

  function creerCompte() {
    const u = document.getElementById('newUsername').value;
    const p = document.getElementById('newPassword').value;
    const r = document.getElementById('newRole').value;
    const feedback = document.getElementById('creerFeedback');
    if (!u||!p) { feedback.textContent = "Remplis tous les champs !"; feedback.className = 'feedback error'; return; }
    fetch(`${BOT_URL}/comptes`, { method: 'POST', headers: headers(), body: JSON.stringify({ username: u, password: p, role: r }) })
    .then(r => r.json()).then(data => {
      if (data.success) { feedback.textContent = "✅ Compte créé !"; feedback.className = 'feedback success'; document.getElementById('newUsername').value = ''; document.getElementById('newPassword').value = ''; chargerComptes(); }
      else { feedback.textContent = "❌ " + data.error; feedback.className = 'feedback error'; }
    });
  }

  function modifierCompte() {
    const u = document.getElementById('modUsername').value;
    const newU = document.getElementById('modNewUsername').value;
    const newP = document.getElementById('modNewPassword').value;
    const newR = document.getElementById('modNewRole').value;
    const feedback = document.getElementById('modifierFeedback');
    if (!u) { feedback.textContent = "Remplis le nom d'utilisateur actuel !"; feedback.className = 'feedback error'; return; }
    if (!newU && !newP && !newR) { feedback.textContent = "Remplis au moins un champ à modifier !"; feedback.className = 'feedback error'; return; }
    fetch(`${BOT_URL}/comptes/${u}`, { method: 'PUT', headers: headers(), body: JSON.stringify({ newUsername: newU||undefined, newPassword: newP||undefined, newRole: newR||undefined }) })
    .then(r => r.json()).then(data => {
      if (data.success) { feedback.textContent = "✅ Compte modifié !"; feedback.className = 'feedback success'; document.getElementById('modUsername').value = ''; document.getElementById('modNewUsername').value = ''; document.getElementById('modNewPassword').value = ''; document.getElementById('modNewRole').value = ''; chargerComptes(); }
      else { feedback.textContent = "❌ " + data.error; feedback.className = 'feedback error'; }
    });
  }

  function supprimerCompte(u) {
    if (!confirm(`Supprimer le compte "${u}" ?`)) return;
    fetch(`${BOT_URL}/comptes/${u}`, { method: 'DELETE', headers: headers() }).then(r => r.json()).then(data => { if (data.success) chargerComptes(); });
  }
</script>
</body>
