<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiBOT Dashboard</title>
  <style>
    :root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--text:#f0f0f0;--text2:#aaa;--border:#0f3460;--border2:#333;--shadow:rgba(0,0,0,0.3);--gold:#FFD700;--gold2:#e6c200;--danger:#f44336;--success:#4CAF50}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    /* Login */
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:var(--bg2);padding:40px;border-radius:16px;width:340px;border:2px solid var(--gold);box-shadow:0 4px 24px var(--shadow)}
    .login-box h2{text-align:center;margin-bottom:20px;color:var(--gold)}
    .login-box input{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);margin-bottom:12px}
    .login-box button{width:100%;padding:12px;background:var(--gold);color:#1a1a2e;border:none;border-radius:8px;font-weight:bold;cursor:pointer;width:100%}
    
    /* Dashboard */
    .dashboard{display:none;min-height:100vh}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px}
    .nav-item{padding:12px;cursor:pointer;color:var(--text2);border-radius:8px;margin-bottom:5px}
    .nav-item:hover, .nav-item.active{background:var(--bg3);color:var(--gold)}
    
    .main{margin-left:220px;padding:24px}
    .page{display:none}
    .page.active{display:block}
    
    .card{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--border);margin-bottom:20px}
    .status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px}
    .online{background:var(--success)}.offline{background:var(--danger)}
    
    .feedback{padding:10px;border-radius:8px;margin-top:10px;display:none;font-size:14px}
    .error{background:rgba(244,67,54,0.2);color:var(--danger);border:1px solid var(--danger);display:block}
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <form class="login-box" onsubmit="login(event)">
    <h2>MultiBOT</h2>
    <input type="text" id="loginUsername" placeholder="Nom d'utilisateur" required>
    <input type="password" id="loginPassword" placeholder="Mot de passe" required>
    <button type="submit">Se connecter</button>
    <div class="feedback" id="loginError"></div>
  </form>
</div>

<div class="dashboard" id="dashboard">
  <div class="sidebar">
    <h3 style="color:var(--gold);margin-bottom:20px">Dashboard</h3>
    <div class="nav-item active" onclick="goPage('accueil')">🏠 Accueil</div>
    <div class="nav-item" id="navComptes" style="display:none" onclick="goPage('comptes')">👥 Comptes</div>
    <div style="margin-top:auto">
      <p id="sidebarUser" style="font-size:14px;font-weight:bold"></p>
      <p id="sidebarRole" style="font-size:12px;color:var(--text2);margin-bottom:10px"></p>
      <button onclick="logout()" style="background:none;border:1px solid var(--danger);color:var(--danger);padding:5px 10px;border-radius:5px;cursor:pointer;width:100%">Déconnexion</button>
    </div>
  </div>
  
  <div class="main">
    <div class="page active" id="page-accueil">
      <h2 style="margin-bottom:20px">Statut du Bot</h2>
      <div class="card">
        <p><span id="statusDot" class="status-dot offline"></span> Statut: <span id="statusText">Déconnecté</span></p>
        <p style="margin-top:10px">Tag: <span id="botTag">...</span></p>
        <p>Uptime: <span id="uptime">0s</span></p>
      </div>
      
      <h2 style="margin-bottom:20px">Statistiques Globales</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div class="card"><h3>Détruits</h3><p id="statDetruits" style="font-size:24px;color:var(--gold)">0</p></div>
        <div class="card"><h3>Perdus</h3><p id="statPerdus" style="font-size:24px;color:var(--danger)">0</p></div>
      </div>
    </div>

    <div class="page" id="page-comptes">
      <h2>Gestion des Comptes</h2>
      <div id="listComptes" style="margin-top:20px"></div>
    </div>
  </div>
</div>

<script>
const BOT_URL = window.location.origin;

// Prépare les headers x-username et x-password pour index.js
function hdr() {
  const user = JSON.parse(localStorage.getItem('bot_auth'));
  return {
    'Content-Type': 'application/json',
    'x-username': user ? user.username : '',
    'x-password': user ? user.password : ''
  };
}

async function login(event) {
  event.preventDefault();
  const u = document.getElementById('loginUsername').value;
  const p = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginError');

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });

    const data = await res.json();

    if (data.success) {
      // Sauvegarde exactement ce que le serveur renvoie
      localStorage.setItem('bot_auth', JSON.stringify({
        username: u, 
        password: p, 
        role: data.role 
      }));
      showDashboard();
    } else {
      err.textContent = data.error || "Identifiants incorrects";
      err.className = "feedback error";
    }
  } catch (e) {
    err.textContent = "Erreur de connexion au serveur";
    err.className = "feedback error";
  }
}

function logout() {
  localStorage.clear();
  location.reload();
}

function showDashboard() {
  const user = JSON.parse(localStorage.getItem('bot_auth'));
  if (!user) return;

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  document.getElementById('sidebarUser').textContent = user.username;
  document.getElementById('sidebarRole').textContent = "Rôle: " + user.role;

  if (user.role === 'admin') {
    document.getElementById('navComptes').style.display = 'block';
  }

  updateStatus();
  updateStats();
  setInterval(updateStatus, 10000); // Update toutes les 10s
}

async function updateStatus() {
  try {
    const res = await fetch('/status', { headers: hdr() });
    if (res.status === 401) return logout();
    const data = await res.json();
    
    document.getElementById('statusText').textContent = data.online ? "En ligne" : "Hors ligne";
    document.getElementById('statusDot').className = "status-dot " + (data.online ? "online" : "offline");
    document.getElementById('botTag').textContent = data.tag;
    document.getElementById('uptime').textContent = data.uptime + "s";
  } catch (e) {}
}

async function updateStats() {
  try {
    const res = await fetch('/stats', { headers: hdr() });
    const data = await res.json();
    document.getElementById('statDetruits').textContent = data.charsDetruitTotal || 0;
    document.getElementById('statPerdus').textContent = data.charsPerdusTotal || 0;
  } catch (e) {}
}

function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if(id === 'comptes') loadComptes();
}

async function loadComptes() {
  const res = await fetch('/comptes', { headers: hdr() });
  const data = await res.json();
  const container = document.getElementById('listComptes');
  container.innerHTML = data.map(c => `
    <div class="card" style="display:flex; justify-content:space-between; align-items:center">
      <span><strong>${c.username}</strong> (${c.role})</span>
      ${c.username !== 'admin' ? `<button onclick="deleteCompte('${c.username}')" style="color:red; background:none; border:none; cursor:pointer">Supprimer</button>` : ''}
    </div>
  `).join('');
}

// Au chargement, on vérifie si on est déjà connecté
if (localStorage.getItem('bot_auth')) {
  showDashboard();
}
</script>
</body>
</html>
