<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiBOT Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }

    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #16213e; padding: 40px; border-radius: 16px; width: 340px; border: 1px solid #FFD700; }
    .login-box h2 { text-align: center; color: #FFD700; margin-bottom: 24px; font-size: 22px; }
    .login-box input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0f3460; color: #fff; font-size: 15px; margin-bottom: 12px; }
    .login-box button { width: 100%; padding: 12px; background: #FFD700; color: #1a1a2e; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .login-box button:hover { background: #e6c200; }

    .dashboard { display: none; padding: 30px; max-width: 900px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .header h1 { color: #FFD700; font-size: 26px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .username-badge { background: #0f3460; padding: 6px 12px; border-radius: 8px; font-size: 13px; color: #FFD700; }
    .logout { background: transparent; border: 1px solid #FFD700; color: #FFD700; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .logout:hover { background: #FFD700; color: #1a1a2e; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: #16213e; border-radius: 12px; padding: 24px; border: 1px solid #0f3460; }
    .card h3 { color: #aaa; font-size: 13px; margin-bottom: 10px; text-transform: uppercase; }
    .card p { font-size: 20px; font-weight: bold; color: #FFD700; word-break: break-all; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    .online { background: #4CAF50; }
    .offline { background: #f44336; }

    .section { background: #16213e; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid #0f3460; }
    .section h2 { color: #FFD700; margin-bottom: 20px; font-size: 18px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-row input, .form-row textarea, .form-row select { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0f3460; color: #fff; font-size: 14px; min-width: 150px; }
    .form-row textarea { height: 100px; resize: vertical; }
    .btn { padding: 12px 24px; background: #FFD700; color: #1a1a2e; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; }
    .btn:hover { opacity: 0.9; }
    .btn-danger { background: #f44336; color: #fff; padding: 6px 12px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; }
    .feedback { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 14px; display: none; }
    .feedback.success { background: #1e4d2b; color: #4CAF50; display: block; }
    .feedback.error { background: #4d1e1e; color: #f44336; display: block; }

    .nation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-top: 16px; }
    .nation-card { background: #0f3460; border-radius: 10px; padding: 16px; text-align: center; border: 1px solid #FFD700; }
    .nation-card .emoji { font-size: 28px; margin-bottom: 8px; }
    .nation-card .label { color: #aaa; font-size: 12px; text-transform: uppercase; margin-bottom: 4px; }
    .nation-card .value { color: #FFD700; font-size: 18px; font-weight: bold; }

    .comptes-list { margin-top: 16px; }
    .compte-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #0f3460; border-radius: 8px; margin-bottom: 8px; }
    .compte-info { display: flex; align-items: center; gap: 12px; }
    .role-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .role-admin { background: #FFD700; color: #1a1a2e; }
    .role-normal { background: #0f3460; color: #aaa; border: 1px solid #333; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; border: 1px solid #0f3460; color: #aaa; background: transparent; }
    .tab.active { background: #FFD700; color: #1a1a2e; border-color: #FFD700; font-weight: bold; }

    .send-results { margin-top: 12px; }
    .send-result-item { padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
    .send-result-item.ok { background: #1e4d2b; color: #4CAF50; }
    .send-result-item.ko { background: #4d1e1e; color: #f44336; }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>⚡ MultiBOT</h2>
    <input type="text" id="loginUsername" placeholder="Nom d'utilisateur" onkeydown="if(event.key==='Enter') login()">
    <input type="password" id="loginPassword" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Se connecter</button>
    <div class="feedback error" id="loginError" style="display:none;margin-top:12px">Identifiants incorrects</div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <h1>⚡ MultiBOT Dashboard</h1>
    <div class="header-right">
      <span class="username-badge" id="usernameDisplay"></span>
      <button class="logout" onclick="logout()">Se déconnecter</button>
    </div>
  </div>

  <!-- Statut bot -->
  <div class="cards">
    <div class="card">
      <h3>Statut</h3>
      <p><span class="status-dot" id="statusDot"></span><span id="statusText">Chargement...</span></p>
    </div>
    <div class="card">
      <h3>Bot</h3>
      <p id="botTag">...</p>
    </div>
    <div class="card">
      <h3>Uptime</h3>
      <p id="uptime">...</p>
    </div>
    <div class="card">
      <h3>Actions</h3>
      <div style="margin-top:4px">
        <button class="btn" style="background:#FF9800;color:#fff" onclick="restartBot()">🔄 Restart</button>
      </div>
    </div>
  </div>

  <!-- NationsGlory -->
  <div class="section">
    <h2>🌍 Cap Vert — NationsGlory</h2>
    <button class="btn" onclick="chargerNation()">🔄 Actualiser</button>
    <div class="nation-grid" id="nationGrid">
      <div style="color:#aaa;margin-top:16px">Clique sur Actualiser pour charger les stats</div>
    </div>
  </div>

  <!-- Envoyer un message -->
  <div class="section">
    <h2>💬 Envoyer un message</h2>
    <div class="form-row">
      <input type="text" id="userIds" placeholder="IDs Discord séparés par des virgules (ex: 123,456,789)">
    </div>
    <div class="form-row" style="margin-top:12px">
      <textarea id="messageContent" placeholder="Ton message..."></textarea>
    </div>
    <div style="margin-top:12px">
      <button class="btn" onclick="envoyerMessage()">Envoyer</button>
    </div>
    <div class="send-results" id="sendResults"></div>
  </div>

  <!-- Gestion des comptes (admin uniquement) -->
  <div class="section" id="sectionComptes" style="display:none">
    <h2>👥 Gestion des comptes</h2>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('liste')">Liste</button>
      <button class="tab" onclick="switchTab('creer')">Créer</button>
      <button class="tab" onclick="switchTab('password')">Changer mot de passe</button>
    </div>

    <div id="tabListe">
      <div class="comptes-list" id="comptesList"></div>
    </div>

    <div id="tabCreer" style="display:none">
      <div class="form-row">
        <input type="text" id="newUsername" placeholder="Nom d'utilisateur">
        <input type="password" id="newPassword" placeholder="Mot de passe">
        <select id="newRole">
          <option value="normal">Normal</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div style="margin-top:12px">
        <button class="btn" onclick="creerCompte()">Créer le compte</button>
      </div>
      <div class="feedback" id="creerFeedback"></div>
    </div>

    <div id="tabPassword" style="display:none">
      <div class="form-row">
        <input type="text" id="pwUsername" placeholder="Nom d'utilisateur">
        <input type="password" id="pwNew" placeholder="Nouveau mot de passe">
      </div>
      <div style="margin-top:12px">
        <button class="btn" onclick="changerPassword()">Changer</button>
      </div>
      <div class="feedback" id="passwordFeedback"></div>
    </div>
  </div>
</div>

<script>
  const BOT_URL = window.location.origin;
  let username = '';
  let password = '';
  let role = '';

  function login() {
    username = document.getElementById('loginUsername').value;
    password = document.getElementById('loginPassword').value;
    fetch(`${BOT_URL}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        document.getElementById('loginError').style.display = 'block';
      } else {
        role = data.role;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('usernameDisplay').textContent = `👤 ${username} (${role})`;
        if (role === 'admin') {
          document.getElementById('sectionComptes').style.display = 'block';
          chargerComptes();
        }
        chargerStatut();
        chargerNation();
        setInterval(chargerStatut, 10000);
      }
    });
  }

  function logout() {
    username = ''; password = ''; role = '';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('sectionComptes').style.display = 'none';
  }

  function headers() {
    return { 'Content-Type': 'application/json', 'x-username': username, 'x-password': password };
  }

  function chargerStatut() {
    fetch(`${BOT_URL}/status`, { headers: headers() })
      .then(r => r.json())
      .then(data => {
        const dot = document.getElementById('statusDot');
        dot.className = 'status-dot ' + (data.online ? 'online' : 'offline');
        document.getElementById('statusText').textContent = data.online ? 'En ligne' : 'Hors ligne';
        document.getElementById('botTag').textContent = data.tag;
        const h = Math.floor(data.uptime / 3600);
        const m = Math.floor((data.uptime % 3600) / 60);
        const s = data.uptime % 60;
        document.getElementById('uptime').textContent = `${h}h ${m}m ${s}s`;
      });
  }

  function chargerNation() {
    const grid = document.getElementById('nationGrid');
    grid.innerHTML = '<div style="color:#aaa;margin-top:16px">Chargement...</div>';
    fetch(`${BOT_URL}/nation`, { headers: headers() })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          grid.innerHTML = `<div style="color:#f44336">❌ ${data.error}</div>`;
          return;
        }
        grid.innerHTML = `
          <div class="nation-card"><div class="emoji">👥</div><div class="label">Membres</div><div class="value">${data.members || '?'}</div></div>
          <div class="nation-card"><div class="emoji">💰</div><div class="label">Argent</div><div class="value">${data.bank ? data.bank.toLocaleString() + ' $' : '?'}</div></div>
          <div class="nation-card"><div class="emoji">⚔️</div><div class="label">Power</div><div class="value">${data.power || '?'}/${data.maxPower || '?'}</div></div>
          <div class="nation-card"><div class="emoji">📊</div><div class="label">MMR</div><div class="value">${data.mmr || '?'}</div></div>
          <div class="nation-card"><div class="emoji">🗺️</div><div class="label">Claims</div><div class="value">${data.claims || '?'}</div></div>
          <div class="nation-card"><div class="emoji">🖥️</div><div class="label">Serveur</div><div class="value">Mocha</div></div>
        `;
      })
      .catch(() => {
        grid.innerHTML = '<div style="color:#f44336">❌ Erreur de connexion à l\'API</div>';
      });
  }

  function envoyerMessage() {
    const ids = document.getElementById('userIds').value.split(',').map(id => id.trim()).filter(id => id);
    const message = document.getElementById('messageContent').value;
    const results = document.getElementById('sendResults');
    if (!ids.length || !message) {
      results.innerHTML = '<div class="send-result-item ko">Remplis tous les champs !</div>';
      return;
    }
    fetch(`${BOT_URL}/send`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ userIds: ids, message })
    })
    .then(r => r.json())
    .then(data => {
      results.innerHTML = data.results.map(r =>
        `<div class="send-result-item ${r.success ? 'ok' : 'ko'}">
          ${r.success ? '✅' : '❌'} ID ${r.userId} — ${r.success ? 'Envoyé !' : r.error}
        </div>`
      ).join('');
      if (data.results.every(r => r.success)) document.getElementById('messageContent').value = '';
    });
  }

  function restartBot() {
    if (!confirm("Redémarrer MultiBOT ?")) return;
    fetch(`${BOT_URL}/restart`, { method: 'POST', headers: headers() })
      .then(r => r.json())
      .then(data => {
        if (data.success) alert("✅ MultiBOT en cours de redémarrage !");
        else alert("❌ Erreur : " + data.error);
      });
  }

  function switchTab(tab) {
    ['liste', 'creer', 'password'].forEach(t => {
      document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? 'block' : 'none';
    });
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', ['liste', 'creer', 'password'][i] === tab);
    });
    if (tab === 'liste') chargerComptes();
  }

  function chargerComptes() {
    fetch(`${BOT_URL}/comptes`, { headers: headers() })
      .then(r => r.json())
      .then(data => {
        document.getElementById('comptesList').innerHTML = data.map(c => `
          <div class="compte-item">
            <div class="compte-info">
              <span>${c.username}</span>
              <span class="role-badge role-${c.role}">${c.role}</span>
            </div>
            ${c.username !== 'admin' ? `<button class="btn-danger" onclick="supprimerCompte('${c.username}')">Supprimer</button>` : ''}
          </div>
        `).join('');
      });
  }

  function creerCompte() {
    const u = document.getElementById('newUsername').value;
    const p = document.getElementById('newPassword').value;
    const r = document.getElementById('newRole').value;
    const feedback = document.getElementById('creerFeedback');
    if (!u || !p) { feedback.textContent = "Remplis tous les champs !"; feedback.className = 'feedback error'; return; }
    fetch(`${BOT_URL}/comptes`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ username: u, password: p, role: r })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        feedback.textContent = "✅ Compte créé !";
        feedback.className = 'feedback success';
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
      } else {
        feedback.textContent = "❌ " + data.error;
        feedback.className = 'feedback error';
      }
    });
  }

  function supprimerCompte(u) {
    if (!confirm(`Supprimer le compte "${u}" ?`)) return;
    fetch(`${BOT_URL}/comptes/${u}`, { method: 'DELETE', headers: headers() })
      .then(r => r.json())
      .then(data => { if (data.success) chargerComptes(); });
  }

  function changerPassword() {
    const u = document.getElementById('pwUsername').value;
    const p = document.getElementById('pwNew').value;
    const feedback = document.getElementById('passwordFeedback');
    if (!u || !p) { feedback.textContent = "Remplis tous les champs !"; feedback.className = 'feedback error'; return; }
    fetch(`${BOT_URL}/comptes/${u}/password`, {
      method: 'PUT',
      headers: headers(),
      body: JSON.stringify({ newPassword: p })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        feedback.textContent = "✅ Mot de passe changé !";
        feedback.className = 'feedback success';
        document.getElementById('pwUsername').value = '';
        document.getElementById('pwNew').value = '';
      } else {
        feedback.textContent = "❌ " + data.error;
        feedback.className = 'feedback error';
      }
    });
  }
</script>
</body>
</html>
