<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARMORED.BOT Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }

    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #16213e; padding: 40px; border-radius: 16px; width: 340px; border: 1px solid #FFD700; }
    .login-box h2 { text-align: center; color: #FFD700; margin-bottom: 24px; font-size: 22px; }
    .login-box input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0f3460; color: #fff; font-size: 15px; margin-bottom: 16px; }
    .login-box button { width: 100%; padding: 12px; background: #FFD700; color: #1a1a2e; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .login-box button:hover { background: #e6c200; }

    .dashboard { display: none; padding: 30px; max-width: 900px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .header h1 { color: #FFD700; font-size: 26px; }
    .logout { background: transparent; border: 1px solid #FFD700; color: #FFD700; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .logout:hover { background: #FFD700; color: #1a1a2e; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: #16213e; border-radius: 12px; padding: 24px; border: 1px solid #0f3460; }
    .card h3 { color: #aaa; font-size: 13px; margin-bottom: 10px; text-transform: uppercase; }
    .card p { font-size: 22px; font-weight: bold; color: #FFD700; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    .online { background: #4CAF50; }
    .offline { background: #f44336; }

    .section { background: #16213e; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid #0f3460; }
    .section h2 { color: #FFD700; margin-bottom: 20px; font-size: 18px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-row input, .form-row textarea { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0f3460; color: #fff; font-size: 14px; min-width: 200px; }
    .form-row textarea { height: 100px; resize: vertical; }
    .btn { padding: 12px 24px; background: #FFD700; color: #1a1a2e; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; }
    .btn:hover { opacity: 0.9; }
    .feedback { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 14px; display: none; }
    .feedback.success { background: #1e4d2b; color: #4CAF50; display: block; }
    .feedback.error { background: #4d1e1e; color: #f44336; display: block; }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>🤖 ARMORED.BOT</h2>
    <input type="password" id="passwordInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Se connecter</button>
    <div class="feedback error" id="loginError" style="display:none">Mot de passe incorrect</div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <h1>🤖 ARMORED.BOT Dashboard</h1>
    <button class="logout" onclick="logout()">Se déconnecter</button>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Statut</h3>
      <p><span class="status-dot" id="statusDot"></span><span id="statusText">Chargement...</span></p>
    </div>
    <div class="card">
      <h3>Bot</h3>
      <p id="botTag">...</p>
    </div>
    <div class="card">
      <h3>Uptime</h3>
      <p id="uptime">...</p>
    </div>
    <div class="card">
      <h3>Actions</h3>
      <div style="margin-top:4px">
        <button class="btn" style="background:#FF9800;color:#fff" onclick="restartBot()">🔄 Restart</button>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>💬 Envoyer un message</h2>
    <div class="form-row">
      <input type="text" id="userId" placeholder="ID Discord de l'utilisateur">
    </div>
    <div class="form-row" style="margin-top:12px">
      <textarea id="messageContent" placeholder="Ton message..."></textarea>
    </div>
    <div style="margin-top:12px">
      <button class="btn" onclick="envoyerMessage()">Envoyer</button>
    </div>
    <div class="feedback" id="sendFeedback"></div>
  </div>
</div>

<script>
  const BOT_URL = window.location.origin;
  let password = '';

  function login() {
    password = document.getElementById('passwordInput').value;
    fetch(`${BOT_URL}/status`, { headers: { 'x-password': password } })
      .then(r => {
        if (r.status === 401) {
          document.getElementById('loginError').style.display = 'block';
        } else {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          chargerStatut();
          setInterval(chargerStatut, 10000);
        }
      });
  }

  function logout() {
    password = '';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  }

  function chargerStatut() {
    fetch(`${BOT_URL}/status`, { headers: { 'x-password': password } })
      .then(r => r.json())
      .then(data => {
        const dot = document.getElementById('statusDot');
        dot.className = 'status-dot ' + (data.online ? 'online' : 'offline');
        document.getElementById('statusText').textContent = data.online ? 'En ligne' : 'Hors ligne';
        document.getElementById('botTag').textContent = data.tag;
        const h = Math.floor(data.uptime / 3600);
        const m = Math.floor((data.uptime % 3600) / 60);
        const s = data.uptime % 60;
        document.getElementById('uptime').textContent = `${h}h ${m}m ${s}s`;
      });
  }

  function envoyerMessage() {
    const userId = document.getElementById('userId').value;
    const message = document.getElementById('messageContent').value;
    const feedback = document.getElementById('sendFeedback');
    if (!userId || !message) {
      feedback.textContent = "Remplis tous les champs !";
      feedback.className = 'feedback error';
      return;
    }
    fetch(`${BOT_URL}/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-password': password },
      body: JSON.stringify({ userId, message })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        feedback.textContent = "✅ Message envoyé !";
        feedback.className = 'feedback success';
        document.getElementById('messageContent').value = '';
      } else {
        feedback.textContent = "❌ Erreur : " + data.error;
        feedback.className = 'feedback error';
      }
    });
  }

  function restartBot() {
    if (!confirm("Redémarrer le bot ?")) return;
    fetch(`${BOT_URL}/restart`, {
      method: 'POST',
      headers: { 'x-password': password }
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) alert("✅ Bot en cours de redémarrage !");
      else alert("❌ Erreur : " + data.error);
    });
  }
</script>
</body>
</html>
